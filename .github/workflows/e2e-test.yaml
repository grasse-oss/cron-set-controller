name: End-to-End Test

on:
  pull_request:
    branches: [main]

env:
  NAMESPACE: cron-set-controller-system

jobs:
  docs_only_check:
    name: Check for docs-only change
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.changed-files.outputs.any_changed == 'false' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changed-files
        name: Get changed files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files_ignore: |
            **/*.md
            **/*.pnd
            **/*.txt
      - id: which_files
        name: Which files was changed
        run: |
          echo "One or more files has changed."
          echo "List all the files that have changed: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "What is any changed ${{ steps.changed-files.outputs.any_changed }}"

  end-to-end:
    runs-on: ubuntu-latest
    needs:
      - docs_only_check
    if: (needs.docs_only_check.outputs.docs_only != 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: ko-build/setup-ko@v0.8
        with:
          version: v0.18.1
    
      - name: Set up KinD
        id: kind
        run: |
          # create KinD cluster
          make kind-cluster

      - name: Build and load
        env:
          KO_DOCKER_REPO: ko.local/grasse/cronset-controller
        run: |
          ko build --sbom=none --bare
          kind load docker-image "$KO_DOCKER_REPO"

      - name: Run e2e
        shell: bash
        run: |
          # install kuttl
          make kuttl
          # run e2e test
          VERSION=latest make e2e

      - name: Debug failure
        if: failure()
        run: |
          kubectl version
          kubectl get all
          kubectl get cronset
          kubectl get cronjob
          kubectl get crd
          POD=$(kubectl get pods -n $NAMESPACE -l control-plane=controller-manager --output=jsonpath={.items..metadata.name})
          kubectl logs -n $NAMESPACE $POD -c manager
