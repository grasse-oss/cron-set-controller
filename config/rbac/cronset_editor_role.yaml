# This rule is not used by the project cron-set-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the batch.grasse.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cron-set-controller
    app.kubernetes.io/managed-by: kustomize
  name: cronset-editor-role
rules:
- apiGroups:
  - batch.grasse.io
  resources:
  - cronsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.grasse.io
  resources:
  - cronsets/status
  verbs:
  - get
